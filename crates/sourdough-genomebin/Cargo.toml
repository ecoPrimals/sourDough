[package]
name = "sourdough-genomebin"
version = "0.1.0"
edition = "2021"
authors = ["ecoPrimals Team"]
description = "Pure Rust genomeBin infrastructure - type-safe, concurrent, universal deployment"
license = "AGPL-3.0"
repository = "https://github.com/ecoPrimals/sourDough"

[dependencies]
# Async runtime
tokio = { version = "1.42", features = ["full"] }
futures = "0.3"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Archive operations - Pure Rust!
tar = "0.4"
flate2 = "1.0"

# Hashing - Pure Rust!
blake3 = "1.5"
sha2 = "0.10"

# Zero-copy
bytes = "1.8"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Logging
tracing = "0.1"

# Platform detection - Pure Rust!
sysinfo = "0.32"

# Path operations
camino = "1.1"

# Temp directories
tempfile = "3.13"

chrono = { version = "0.4.43", features = ["serde"] }

# NOTE: GPG signing removed for now (gpgme has C dependencies)
# Future: Add Pure Rust signing via sequoia-openpgp

[dev-dependencies]
tempfile = "3.13"
tokio-test = "0.4"
proptest = "1.6"

[features]
default = []

[lib]
doctest = true
