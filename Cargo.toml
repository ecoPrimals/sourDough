[workspace]
resolver = "2"
members = [
    "crates/sourdough-core",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0"
repository = "https://github.com/ecoPrimals/sourDough"
authors = ["ecoPrimals Project"]

[workspace.dependencies]
# Async runtime
tokio = { version = "1.40", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Cryptography (BearDog integration)
# Note: Actual crypto comes from BearDog, these are for types
ed25519-dalek = "2.1"
blake3 = "1.5"

# Configuration
config = "0.14"

