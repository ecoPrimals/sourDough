# Production Environment Configuration

[logging]
level = "info"
format = "json"
output = "stdout"  # Use systemd journal or logging service

[network]
listen_host = "0.0.0.0"
# listen_port = 8080
enable_tls = true
# tls_cert_path = "/etc/{{PRIMAL_NAME}}/certs/cert.pem"
# tls_key_path = "/etc/{{PRIMAL_NAME}}/certs/key.pem"

[storage]
data_dir = "/var/lib/{{PRIMAL_NAME}}"
cache_dir = "/var/cache/{{PRIMAL_NAME}}"
max_cache_size_mb = 4096

[health]
enabled = true
check_interval_secs = 30

[discovery]
enabled = true
# discovery_service_endpoint discovered at runtime via universal adapter (no hardcoding)
announce_interval_secs = 60

[security]
enable_authentication = true
# bearer_token_file = "/etc/{{PRIMAL_NAME}}/tokens/bearer.token"

[performance]
worker_threads = 8
max_connections = 5000
request_timeout_secs = 30

[features]
experimental_features = false

