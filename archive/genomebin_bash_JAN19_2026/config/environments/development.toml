# Development Environment Configuration

[logging]
level = "debug"
format = "pretty"
output = "stdout"

[network]
listen_host = "127.0.0.1"
# Use non-standard ports for development to avoid conflicts
# listen_port = 18080

[storage]
data_dir = "./data"
cache_dir = "./cache"

[health]
enabled = true
check_interval_secs = 10

[discovery]
enabled = false  # Typically disabled for local development

[security]
enable_authentication = false  # Relaxed for local dev

[features]
experimental_features = true  # Enable experimental features in dev

