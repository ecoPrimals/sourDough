# genomeBin Standard Configuration Template
# This is a template - customize for your primal

[primal]
# Primal identity
name = "{{PRIMAL_NAME}}"
version = "{{PRIMAL_VERSION}}"
description = "{{PRIMAL_DESCRIPTION}}"

# Logging configuration
[logging]
level = "info"  # trace, debug, info, warn, error
format = "json"  # json, pretty, compact
output = "stdout"  # stdout, stderr, file
# file_path = "/var/log/{{PRIMAL_NAME}}/{{PRIMAL_NAME}}.log"

# Network configuration (if applicable)
[network]
# listen_host = "127.0.0.1"
# listen_port = 8080
# enable_tls = false
# tls_cert_path = "/etc/{{PRIMAL_NAME}}/certs/cert.pem"
# tls_key_path = "/etc/{{PRIMAL_NAME}}/certs/key.pem"

# Storage configuration (if applicable)
[storage]
# data_dir = "/var/lib/{{PRIMAL_NAME}}"
# cache_dir = "/var/cache/{{PRIMAL_NAME}}"
# max_cache_size_mb = 1024

# Health check configuration
[health]
enabled = true
# check_interval_secs = 30
# timeout_secs = 5

# Integration with other primals (discovery via Songbird)
[discovery]
enabled = false
# songbird_endpoint = "http://127.0.0.1:7878"
# announce_interval_secs = 60

# Security configuration
[security]
# enable_authentication = true
# bearer_token_file = "/etc/{{PRIMAL_NAME}}/tokens/bearer.token"

# Performance tuning
[performance]
# worker_threads = 4
# max_connections = 1000
# request_timeout_secs = 30

# Feature flags
[features]
# Enable optional features here
# experimental_features = false

# Environment-specific overrides
# Can be overridden by environment variables:
# {{PRIMAL_NAME_UPPER}}_LOGGING_LEVEL=debug
# {{PRIMAL_NAME_UPPER}}_NETWORK_LISTEN_PORT=9090

