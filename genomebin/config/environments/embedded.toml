# Embedded/Edge Environment Configuration
# Optimized for resource-constrained environments

[logging]
level = "warn"  # Minimal logging to save resources
format = "compact"
output = "stdout"

[network]
listen_host = "127.0.0.1"
# listen_port = 8080
enable_tls = false  # Often not needed on edge devices

[storage]
data_dir = "/opt/{{PRIMAL_NAME}}/data"
cache_dir = "/tmp/{{PRIMAL_NAME}}"
max_cache_size_mb = 128  # Limited cache for edge devices

[health]
enabled = true
check_interval_secs = 60  # Less frequent checks

[discovery]
enabled = true  # Important for edge device coordination
announce_interval_secs = 120

[security]
enable_authentication = true  # Security still important on edge

[performance]
worker_threads = 2  # Limited threads for embedded
max_connections = 100
request_timeout_secs = 60  # Longer timeout for slow networks

[features]
experimental_features = false

